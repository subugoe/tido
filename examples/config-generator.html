<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamisches JSON-Formular</title>
  <script src="./icons/icons.js"></script>
  <script>
  </script>

  <script>
    const icons = Object.keys(iconSvgs).map(key => ({ value: key, svg: encodeURIComponent(iconSvgs[key]) }));

    function addPanel() {
      let panelContainer = document.getElementById("panels");
      let panelIndex = panelContainer.children.length;
      let panelDiv = document.createElement("div");
      panelDiv.innerHTML = `
        <h3>Panel ${panelIndex + 1}</h3>
        <label>Label: <input type="text" name="panels[${panelIndex}][label]" required></label>
        <button type="button" onclick="addView(${panelIndex})">Add View</button>
        <div id="views-${panelIndex}"></div>
      `;
      panelContainer.appendChild(panelDiv);
    }

    function addView(panelIndex) {
      let viewContainer = document.getElementById(`views-${panelIndex}`);
      let viewIndex = viewContainer.children.length;
      let viewDiv = document.createElement("div");
      viewDiv.id = `view-${panelIndex}-${viewIndex}`;
      viewDiv.innerHTML = `
                <h4>View ${viewIndex + 1}</h4>
                <label>ID: <input type="text" name="panels[${panelIndex}][views][${viewIndex}][id]" required></label>
                <label>Label: <input type="text" name="panels[${panelIndex}][views][${viewIndex}][label]" required></label>
                <label>Connector ID: <input type="number" name="panels[${panelIndex}][views][${viewIndex}][connector][id]" required oninput="addConnectorOptions(event, ${panelIndex}, ${viewIndex})"></label>
            `;
      viewContainer.appendChild(viewDiv);
    }

    function addLabel() {
      let labelContainer = document.getElementById("labels");
      let labelDiv = document.createElement("div");
      labelDiv.innerHTML = `
        <label>Type:
          <select onchange="updateLabelKey(this)">
              <option value="item">Item</option>
              <option value="manifest">Manifest</option>
          </select>
        </label>
        <label>Value: <input type="text" oninput="updateLabelValue(this)"></label>
      `;
      labelContainer.appendChild(labelDiv);
    }

    function updateLabelKey(selectElement) {
      selectElement.parentElement.parentElement.dataset.key = selectElement.value;
    }

    function updateLabelValue(inputElement) {
      inputElement.parentElement.parentElement.dataset.value = inputElement.value;
    }

    function addConnectorOptions(event, panelIndex, viewIndex) {
      const { data } = event
      const container = document.getElementById(`view-${panelIndex}-${viewIndex}`);
      const optionsDiv = document.createElement('div');

      if (data === "5") {
        optionsDiv.innerHTML = `
          <h5>Connector Options for Annotations</h5>
          <h6>Types: </h6>
          <div id="types-${panelIndex}-${viewIndex}"></div>
          <button type="button" onclick="addAnnotationType(${panelIndex}, ${panelIndex}, document.getElementById('types-${panelIndex}-${viewIndex}'))">Add Type</button>
        `
      }
      container.appendChild(optionsDiv);
    }

    function addAnnotationType(panelIndex, viewIndex, container) {
      let typeIndex = container.children.length;
      const typeDiv = document.createElement('div');

      typeDiv.innerHTML =
        `<label>Name: <input type="text" name="panels[${panelIndex}][views][${viewIndex}][connector][options][types][${typeIndex}][name]" required></label>
          <label>Icon:
          <select name="panels[${panelIndex}][views][${viewIndex}][connector][options][types][${typeIndex}][icon]">
            ${ icons.map(icon => `<option value="${icon.value}" style="background-image:url('data:image/svg+xml,${icon.svg}')">bla</option>`).join() }
          </select></label>
        <label>Display When: <input type="text" name="panels[${panelIndex}][views][${viewIndex}][connector][options][types][${typeIndex}][displayWhen]"></label>
        <label>
          Annotation Type:
          <select name="panels[${panelIndex}][views][${viewIndex}][connector][options][types][${typeIndex}][annotationType]">
            <option value="annotation">annotation</option>
            <option value="text">text</option>
          </select>
        </label>
        `;

      container.appendChild(typeDiv);
    }

    function exportJSON() {
      let formData = new FormData(document.getElementById("jsonForm"));
      let jsonOutput = { collection: formData.get("collection"), manifest: formData.get("manifest"), lang: formData.get("lang"), labels: {}, colors: {}, header: {}, panels: [] };

      document.querySelectorAll("#labels > div").forEach(labelDiv => {
        let key = labelDiv.dataset.key;
        let value = labelDiv.dataset.value;
        if (key && value) {
          jsonOutput.labels[key] = value;
        }
      });

      jsonOutput.colors.forceMode = formData.get("colors[forceMode]");
      jsonOutput.colors.primary = formData.get("colors[primary]");

      jsonOutput.header.show = formData.get("header[show]") === "true";
      jsonOutput.header.navigation = formData.get("header[navigation]") === "true";
      jsonOutput.header.panelsToggle = formData.get("header[panelsToggle]") === "true";
      jsonOutput.header.languageSwitch = formData.get("header[languageSwitch]") === "true";

      for (let entry of formData.entries()) {
        let keys = entry[0].split(/\[|\]|\./).filter(k => k);
        let obj = jsonOutput;
        while (keys.length > 1) {
          let key = keys.shift();
          obj = obj[key] = obj[key] || (isNaN(keys[0]) ? {} : []);
        }
        obj[keys[0]] = entry[1];
      }
      document.getElementById("output").textContent = JSON.stringify(jsonOutput, null, 2);
    }
  </script>
</head>
<body>
<h1>Dynamisches JSON-Formular</h1>
<form id="jsonForm">
  <label>Collection URL: <input type="text" name="collection" required></label>
  <label>Manifest: <input type="text" name="manifest" required></label>
  <label>Language:
    <select name="lang">
      <option value="en">English</option>
      <option value="de">Deutsch</option>
    </select>
  </label>
  <button type="button" onclick="addLabel()">Add Label</button>
  <div id="labels"></div>
  <h2>Colors</h2>
  <label>Force Mode:
    <select name="colors[forceMode]">
      <option value="light">Light</option>
      <option value="dark">Dark</option>
    </select>
  </label>
  <label>Primary Color: <input type="color" name="colors[primary]"></label>
  <h2>Header</h2>
  <label>Show: <input type="checkbox" name="header[show]" value="true"></label>
  <label>Navigation: <input type="checkbox" name="header[navigation]" value="true"></label>
  <label>Panels Toggle: <input type="checkbox" name="header[panelsToggle]" value="true"></label>
  <label>Language Switch: <input type="checkbox" name="header[languageSwitch]" value="true"></label>
  <button type="button" onclick="addPanel()">Add Panel</button>
  <div id="panels"></div>
  <button type="button" onclick="exportJSON()">Export JSON</button>
</form>
<pre id="output"></pre>
</body>
</html>
