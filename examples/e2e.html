          margin: 0;

<body>
<div id="app"></div>
<div id="alternativeApp"></div>
<script src="dist/tido.min.js"></script>
<script>
  function parseFormEncoded(queryString) {
    const params = new URLSearchParams(queryString);
    const result = {};

    for (const [rawKey, value] of params.entries()) {
      let parts = rawKey.split(/\[|\]|\./).filter(p => p !== "");

      const isArrayPush = rawKey.endsWith("[]");

      // For array pushes, drop the last empty part entirely.
      if (isArrayPush) {
        // parts already filtered, so "exampleKey[]" becomes ["exampleKey"]
      }

      let current = result;

      // Traverse down the object tree
      for (let i = 0; i < parts.length; i++) {
        const key = parts[i];
        const isLast = i === parts.length - 1;

        if (isLast) {
          // FINAL ASSIGNMENT
          if (isArrayPush) {
            // Ensure the target is an array
            if (!Array.isArray(current[key])) {
              current[key] = [];
            }

            // Check if the value is an object
            if (value.startsWith("{") && value.endsWith("}")) {
              try {
                current[key].push(JSON.parse(value));
              } catch (e) {
                console.error("Error parsing JSON:", e);
                current[key].push(value);
              }
            } else {
              current[key].push(
                value === "true" ? true :
                value === "false" ? false :
                value
              );
            }
          } else {
            // Normal property assignment
            // Check if the value is an object
            if (value.startsWith("{") && value.endsWith("}")) {
              try {
                current[key] = JSON.parse(value);
              } catch (e) {
                console.error("Error parsing JSON:", e);
                current[key] = value;
              }
            } else {
              current[key] =
                value === "true" ? true :
                value === "false" ? false :
                value;
            }
          }
        } else {
          // Create containers along the path
          if (!(key in current)) {
            // Look ahead to know if next part implies array
            const next = parts[i + 1];
            const shouldBeArray = /^\d+$/.test(next);
            current[key] = shouldBeArray ? [] : {};
          }
          current = current[key];
        }
      }
    }

    return result;
  }

  function deepMerge(target, source) {
    if (Array.isArray(target) && Array.isArray(source)) {
      return target.map((item, index) =>
        typeof item === "object" && typeof source[index] === "object"
          ? deepMerge(item, source[index])
          : source[index] ?? item
      ).concat(source.slice(target.length)); // Append extra items
    }

    if (typeof target === "object" && typeof source === "object") {
      for (const key in source) {
        target[key] = deepMerge(target[key], source[key]);
      }
      return target;
    }

    return source ?? target;
  }

  const defaultConfig = {
    panels: [{
      collection: "http://localhost:8181/4w/reproduction/collection.json"
    }]
  }

  const urlConfig = parseFormEncoded(window.location.search)
  console.log(urlConfig)
  const config = deepMerge(defaultConfig, urlConfig);
  console.log(config)

  new window.Tido(config);
</script>
</body>
